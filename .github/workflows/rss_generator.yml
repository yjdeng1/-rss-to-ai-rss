name: RSS to AI RSS

on:
  schedule:
    # GitHub Actions 使用 UTC：
    # 北京时间 08:00 = UTC 00:00
    # 北京时间 18:00 = UTC 10:00
    - cron: "0 0,10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      API_KEY: ${{ secrets.API_KEY }}
      API_BASE_URL: ${{ secrets.API_BASE_URL || secrets.BASE_URL }}
      BASE_URL: ${{ secrets.BASE_URL }}
      OPML_PATH: feedbro-subscriptions-20260222-172113.opml
      FEEDS_FILE: feeds.txt
      HISTORY_PATH: history.json
      OUTPUT_XML_PATH: output.xml
      OUTPUT_HTML_PATH: index.html
      MODEL_NAME: deepseek-chat
      OUTPUT_FEED_TITLE: AI 摘要聚合订阅
      OUTPUT_FEED_DESCRIPTION: 自动抓取 RSS 并由 AI 生成中文总结。
      OUTPUT_FEED_ID: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/output.xml
      OUTPUT_FEED_SELF_LINK: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/output.xml
      OUTPUT_FEED_PUBLIC_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/output.xml
      OUTPUT_PAGE_TITLE: AI RSS 每日简报
      OUTPUT_PAGE_SUBTITLE: 支持电脑和手机直接访问，内容由 GitHub Actions 自动更新。
      ENABLE_WEB_FALLBACK: "1"
      WEB_FETCH_TIMEOUT: "20"
      TZ: Asia/Shanghai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate API key
        run: |
          if [ -z "${API_KEY}" ]; then
            echo "ERROR: Missing API_KEY secret."
            exit 1
          fi

      - name: Run RSS generator
        run: python main.py

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add output.xml history.json index.html

          if git diff --cached --quiet; then
            echo "No file changes, skip commit."
          else
            git commit -m "chore: update AI RSS output ($(date -u +'%Y-%m-%dT%H:%M:%SZ'))"
            git push
          fi
